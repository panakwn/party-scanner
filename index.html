<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GANAPEM Party Scanner</title>
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      background-color: #000000;
    }

    :root {
      --bg-0: #030712;
      --bg-1: #0b1020;
      --glass: rgba(255, 255, 255, 0.085);
      --glass-strong: rgba(255, 255, 255, 0.13);
      --stroke: rgba(255, 255, 255, 0.18);
      --stroke-soft: rgba(255, 255, 255, 0.105);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(235, 245, 255, 0.62);
      --muted-2: rgba(235, 245, 255, 0.42);
      --friends: rgba(52, 211, 153, 0.9);
      --friends-soft: rgba(52, 211, 153, 0.16);
      --fof: rgba(248, 113, 113, 0.9);
      --fof-soft: rgba(248, 113, 113, 0.15);
      --blue: rgba(96, 165, 250, 0.95);
      --blue-soft: rgba(96, 165, 250, 0.16);
      --amber: rgba(251, 191, 36, 0.95);
      --amber-soft: rgba(251, 191, 36, 0.16);
      --danger: rgba(248, 113, 113, 0.95);
      --danger-soft: rgba(248, 113, 113, 0.16);
      --radius-xl: 34px;
      --radius-lg: 26px;
      --radius-md: 20px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 25%, rgba(255,255,255,0.18), transparent 18%),
        radial-gradient(circle at 18% 18%, rgba(59,130,246,0.42), transparent 32%),
        radial-gradient(circle at 84% 22%, rgba(168,85,247,0.34), transparent 34%),
        radial-gradient(circle at 18% 86%, rgba(20,184,166,0.30), transparent 34%),
        radial-gradient(circle at 88% 82%, rgba(244,63,94,0.30), transparent 32%),
        linear-gradient(135deg, #020617, #050816 44%, #000 100%);
      background-attachment: fixed;
      background-size: 160% 160%, 180% 180%, 170% 170%, 190% 190%, 175% 175%, 100% 100%;
      animation: auroraInfinite 18s ease-in-out infinite;
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.075) 42%, transparent 60%),
        radial-gradient(circle at 58% 38%, rgba(255,255,255,0.12), transparent 24%);
      mix-blend-mode: screen;
      opacity: 0.65;
      animation: glassSheen 7s ease-in-out infinite alternate;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(circle at 50% 45%, black, transparent 76%);
      opacity: 0.45;
    }

    @keyframes auroraInfinite {
      0% {
        background-position: 50% 25%, 0% 0%, 100% 20%, 20% 100%, 100% 100%, 0% 0%;
      }
      25% {
        background-position: 54% 30%, 30% 12%, 72% 0%, 0% 70%, 80% 88%, 0% 0%;
      }
      50% {
        background-position: 48% 34%, 62% 40%, 50% 28%, 28% 52%, 48% 72%, 0% 0%;
      }
      75% {
        background-position: 44% 28%, 25% 70%, 88% 60%, 62% 20%, 25% 100%, 0% 0%;
      }
      100% {
        background-position: 50% 25%, 0% 0%, 100% 20%, 20% 100%, 100% 100%, 0% 0%;
      }
    }

    @keyframes glassSheen {
      0% { opacity: 0.35; transform: translateX(-2%); }
      100% { opacity: 0.78; transform: translateX(2%); }
    }

    .app {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin: 12px 0 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      background: linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.055));
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.7px;
      margin-bottom: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 14px 44px rgba(0,0,0,0.22);
      backdrop-filter: blur(28px) saturate(175%);
      -webkit-backdrop-filter: blur(28px) saturate(175%);
    }

    .badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(52, 211, 153, 0.9);
      box-shadow: 0 0 18px rgba(52, 211, 153, 0.7);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: -0.8px;
      font-weight: 850;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
    }

    .panel,
    .scanner-window {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.18), transparent 28%),
        linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.055)),
        rgba(10, 15, 28, 0.58);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-xl);
      padding: 18px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -1px 0 rgba(255,255,255,0.055),
        0 28px 95px rgba(0, 0, 0, 0.42),
        0 0 75px rgba(96,165,250,0.08);
      backdrop-filter: blur(34px) saturate(190%);
      -webkit-backdrop-filter: blur(34px) saturate(190%);
    }

    .panel::before,
    .scanner-window::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.24), transparent 30%),
        linear-gradient(115deg, rgba(255,255,255,0.13), transparent 28%, transparent 68%, rgba(255,255,255,0.055));
      opacity: 0.78;
      transition: background 0.12s linear;
    }

    .panel > *,
    .scanner-window > * {
      position: relative;
      z-index: 1;
    }

    .counts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .count-card {
      border-radius: var(--radius-lg);
      padding: 16px;
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.14);
      background: var(--glass);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 16px 40px rgba(0,0,0,0.2);
    }

    .count-card::after {
      content: "";
      position: absolute;
      width: 115px;
      height: 115px;
      border-radius: 999px;
      right: -50px;
      top: -48px;
      filter: blur(1px);
      opacity: 0.95;
    }

    .friends {
      background: linear-gradient(145deg, var(--friends-soft), rgba(255,255,255,0.045));
    }

    .friends::after {
      background: radial-gradient(circle, rgba(52,211,153,0.36), transparent 66%);
    }

    .fof {
      background: linear-gradient(145deg, var(--fof-soft), rgba(255,255,255,0.045));
    }

    .fof::after {
      background: radial-gradient(circle, rgba(248,113,113,0.32), transparent 66%);
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.8px;
      color: var(--muted);
      font-weight: 850;
      position: relative;
      z-index: 1;
    }

    .number {
      font-size: 48px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -1.2px;
      position: relative;
      z-index: 1;
    }

    .friends .number {
      color: rgba(185, 255, 224, 0.96);
    }

    .fof .number {
      color: rgba(255, 207, 207, 0.97);
    }

    .total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: var(--radius-lg);
      padding: 16px;
      background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.045));
      border: 1px solid var(--stroke-soft);
      margin-bottom: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .total span:first-child {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.7px;
      font-weight: 850;
    }

    .total span:last-child {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.8px;
    }

    .status,
    .scanner-status {
      padding: 14px;
      border-radius: var(--radius-md);
      background: linear-gradient(145deg, rgba(255,255,255,0.105), rgba(255,255,255,0.04));
      margin-bottom: 14px;
      text-align: center;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.35;
      border: 1px solid var(--stroke-soft);
      color: var(--muted);
      font-size: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .status.success,
    .scanner-status.success {
      background: linear-gradient(145deg, rgba(52, 211, 153, 0.17), rgba(255,255,255,0.045));
      border-color: rgba(52, 211, 153, 0.24);
      color: rgba(218, 255, 238, 0.92);
    }

    .status.error,
    .scanner-status.error {
      background: linear-gradient(145deg, rgba(248, 113, 113, 0.17), rgba(255,255,255,0.045));
      border-color: rgba(248, 113, 113, 0.24);
      color: rgba(255, 225, 225, 0.92);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      width: 100%;
      align-items: stretch;
    }

    .buttons button {
      width: 100%;
    }

    button {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 15px 12px;
      font-size: 15px;
      font-weight: 850;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, filter 0.12s ease;
      color: white;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 36px rgba(0,0,0,0.22);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }

    button:active {
      transform: scale(0.975);
      filter: brightness(1.08);
    }

    .scan-btn {
      grid-column: 1 / -1;
      background: linear-gradient(145deg, var(--blue-soft), rgba(255,255,255,0.05));
      border-color: rgba(96,165,250,0.34);
      color: rgba(222, 238, 255, 0.96);
      grid-column: 1 / -1;
      min-height: 62px;
      font-size: 18px;
    }

    .reset-btn {
      grid-column: 1 / -1;
      width: 100%;
      background: linear-gradient(145deg, var(--danger-soft), rgba(255,255,255,0.05));
      border-color: rgba(248,113,113,0.32);
      color: rgba(255, 226, 226, 0.96);
    }

    .hint {
      margin-top: 14px;
      color: var(--muted-2);
      font-size: 11px;
      line-height: 1.5;
      text-align: center;
    }

    .reader-wrap {
      position: relative;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
    }

    .scan-result {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
      transition: opacity 0.18s ease, transform 0.18s ease;
      border-radius: var(--radius-lg);
      text-align: center;
      padding: 18px;
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
    }

    .scan-result.show {
      opacity: 1;
      transform: scale(1);
    }

    .scan-result.valid {
      background: rgba(4, 120, 87, 0.54);
      border: 1px solid rgba(110, 231, 183, 0.38);
    }

    .scan-result.invalid {
      background: rgba(127, 29, 29, 0.66);
      border: 1px solid rgba(252, 165, 165, 0.42);
    }

    .scan-result-icon {
      width: 74px;
      height: 74px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      line-height: 1;
      background: rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 18px 45px rgba(0,0,0,0.28);
    }

    .scan-result.valid .scan-result-icon {
      color: rgba(220, 252, 231, 0.98);
    }

    .scan-result.invalid .scan-result-icon {
      color: rgba(254, 226, 226, 0.98);
    }

    .scan-result-text {
      max-width: 280px;
      color: rgba(255,255,255,0.94);
      font-size: 18px;
      font-weight: 900;
      line-height: 1.25;
      text-shadow: 0 2px 14px rgba(0,0,0,0.35);
    }

    .scanner-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
      background: rgba(2, 6, 23, 0.58);
      backdrop-filter: blur(14px) saturate(150%);
      -webkit-backdrop-filter: blur(14px) saturate(150%);
      overflow-y: auto;
    }

    .scanner-overlay.open {
      display: flex;
    }

    .scanner-window {
      width: 100%;
      max-width: 560px;
      margin-top: 6px;
      padding: 14px;
    }

    .scanner-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .scanner-title {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.25px;
    }

    .close-btn {
      background: linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.045));
      color: var(--muted);
      padding: 10px 13px;
      border-radius: 999px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .mini-counts {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .mini-card {
      border-radius: var(--radius-md);
      padding: 10px;
      text-align: center;
      background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.035));
      border: 1px solid var(--stroke-soft);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .mini-card div:first-child {
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.7px;
      margin-bottom: 4px;
    }

    .mini-card div:last-child {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.6px;
    }

    #reader {
      width: min(100%, 360px);
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,0.88);
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-height: 0;
      margin: 0 auto 8px;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 18px 50px rgba(0,0,0,0.25);
    }

    #reader video,
    #reader canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 26px;
      }

      .number {
        font-size: 42px;
      }

      .label {
        font-size: 11px;
      }

      .scanner-window {
        padding: 12px;
      }

      #reader {
        width: min(100%, 315px);
      }

      .mini-card div:last-child {
        font-size: 21px;
      }
    }
  
    /* Darker iOS-style overrides */
    body {
      background:
        radial-gradient(circle at 18% 18%, rgba(37, 99, 235, 0.22), transparent 30%),
        radial-gradient(circle at 84% 22%, rgba(88, 28, 135, 0.18), transparent 31%),
        radial-gradient(circle at 18% 86%, rgba(15, 118, 110, 0.14), transparent 31%),
        radial-gradient(circle at 88% 82%, rgba(127, 29, 29, 0.14), transparent 30%),
        linear-gradient(135deg, #000000, #05070d 48%, #000000 100%) !important;
      color: rgba(255, 255, 255, 0.92);
    }

    body::before {
      opacity: 0.38 !important;
      background:
        linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.035) 42%, transparent 60%),
        radial-gradient(circle at 58% 38%, rgba(255,255,255,0.055), transparent 24%) !important;
    }

    .panel,
    .scanner-window {
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.055), transparent 30%),
        linear-gradient(145deg, rgba(255,255,255,0.075), rgba(255,255,255,0.025)),
        rgba(8, 10, 16, 0.82) !important;
      border-color: rgba(255,255,255,0.10) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.09),
        inset 0 -1px 0 rgba(255,255,255,0.025),
        0 28px 95px rgba(0,0,0,0.70) !important;
    }

    .panel::before,
    .scanner-window::before {
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.065), transparent 30%),
        linear-gradient(115deg, rgba(255,255,255,0.045), transparent 28%, transparent 68%, rgba(255,255,255,0.022)) !important;
      opacity: 0.85 !important;
    }

    .badge,
    .total,
    .status,
    .scanner-status,
    .mini-card,
    .close-btn {
      background: linear-gradient(145deg, rgba(255,255,255,0.065), rgba(255,255,255,0.020)) !important;
      border-color: rgba(255,255,255,0.08) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 12px 35px rgba(0,0,0,0.22) !important;
    }

    .count-card {
      border-color: rgba(255,255,255,0.075) !important;
      background: rgba(255,255,255,0.035) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.055), 0 16px 40px rgba(0,0,0,0.28) !important;
    }

    .friends {
      background: linear-gradient(145deg, rgba(34,197,94,0.10), rgba(255,255,255,0.022)) !important;
    }

    .fof {
      background: linear-gradient(145deg, rgba(239,68,68,0.10), rgba(255,255,255,0.022)) !important;
    }

    .label,
    .subtitle,
    .total span:first-child,
    .mini-card div:first-child,
    .status,
    .scanner-status,
    .close-btn {
      color: rgba(235,245,255,0.52) !important;
    }

    .friends .number {
      color: rgba(187, 247, 208, 0.90) !important;
    }

    .fof .number {
      color: rgba(254, 202, 202, 0.90) !important;
    }

    .scan-btn {
      background: linear-gradient(145deg, rgba(59,130,246,0.14), rgba(255,255,255,0.025)) !important;
      border-color: rgba(96,165,250,0.22) !important;
      color: rgba(219,234,254,0.94) !important;
    }

    .undo-btn {
      background: linear-gradient(145deg, rgba(251,191,36,0.13), rgba(255,255,255,0.025)) !important;
      border-color: rgba(251,191,36,0.20) !important;
      color: rgba(254,243,199,0.94) !important;
    }

    .reset-btn {
      background: linear-gradient(145deg, rgba(248,113,113,0.13), rgba(255,255,255,0.025)) !important;
      border-color: rgba(248,113,113,0.20) !important;
      color: rgba(254,226,226,0.94) !important;
    }

    #reader {
      background: rgba(8, 10, 14, 0.92) !important;
      border-color: rgba(255,255,255,0.10) !important;
    }
  </style>
</head>
<body>


  <div id="scannerOverlay" class="scanner-overlay">
    <div class="scanner-window">
      <div class="scanner-top">
        <div class="scanner-title">QR Scanner</div>
        <button class="close-btn" onclick="closeScannerWindow()">Close</button>
      </div>

      <div class="mini-counts">
        <div class="mini-card">
          <div>FRIENDS</div>
          <div id="modalGreenCount">0</div>
        </div>
        <div class="mini-card">
          <div>F.O.F</div>
          <div id="modalRedCount">0</div>
        </div>
        <div class="mini-card">
          <div>TOTAL</div>
          <div id="modalTotalCount">0</div>
        </div>
      </div>

      <div id="scannerStatus" class="scanner-status">Άνοιγμα κάμερας...</div>
      <div class="reader-wrap">
        <div id="reader"></div>
        <div id="scanResult" class="scan-result">
          <div id="scanResultIcon" class="scan-result-icon">✓</div>
          <div id="scanResultText" class="scan-result-text">Valid QR</div>
        </div>
      </div>




    </div>
  </div>

  <main class="app">
    <div class="header">
      <div class="badge">GANAPEM PARTY 2026</div>
      <h1>QR Entrance Scanner</h1>
      <div class="subtitle">Scan tickets and count entries live</div>
    </div>

    <section class="panel">
      <div class="counts">
        <div class="count-card friends">
          <div class="label">FRIENDS</div>
          <div id="greenCount" class="number">0</div>
        </div>

        <div class="count-card fof">
          <div class="label">FRIENDS OF FRIENDS</div>
          <div id="redCount" class="number">0</div>
        </div>
      </div>

      <div class="total">
        <span>TOTAL ENTRIES</span>
        <span id="totalCount">0</span>
      </div>



      <div id="status" class="status">Πάτα Open Scanner και δώσε άδεια στην κάμερα.</div>

      <div class="buttons">
        <button class="scan-btn" onclick="openScannerWindow()">Open Scanner</button>
        <button class="reset-btn" onclick="resetCounts()">Reset</button>
      </div>


    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getFirestore,
      doc,
      onSnapshot,
      runTransaction,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCi3Wrz2JYULG2Du6GzLfDGhfPlKUxoqII",
      authDomain: "party-scanner-c5caa.firebaseapp.com",
      projectId: "party-scanner-c5caa",
      storageBucket: "party-scanner-c5caa.firebasestorage.app",
      messagingSenderId: "833511449106",
      appId: "1:833511449106:web:f838efac8be7ea0b3c6ecb"
    };

    const FRIENDS_QR = "GANAPEM_PARTY_2026_FRIENDS_ACCESS";
    const FRIENDS_OF_FRIENDS_QR = "GANAPEM_PARTY_2026_FRIENDS_OF_FRIENDS_ACCESS";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const counterRef = doc(db, "party", "counter");

    let html5QrCode = null;
    let scannerRunning = false;
    let scanLocked = false;

    const greenCount = document.getElementById("greenCount");
    const redCount = document.getElementById("redCount");
    const totalCount = document.getElementById("totalCount");
    const modalGreenCount = document.getElementById("modalGreenCount");
    const modalRedCount = document.getElementById("modalRedCount");
    const modalTotalCount = document.getElementById("modalTotalCount");
    const statusBox = document.getElementById("status");
    const scannerStatus = document.getElementById("scannerStatus");
    const scanResult = document.getElementById("scanResult");
    const scanResultIcon = document.getElementById("scanResultIcon");
    const scanResultText = document.getElementById("scanResultText");
    const decodedTextBox = document.getElementById("decodedText");
    const modalDecodedTextBox = document.getElementById("modalDecodedText");
    const scannerOverlay = document.getElementById("scannerOverlay");

    function normalizeQrText(text) {
      return String(text || "").trim();
    }

    function showScanResult(message, type = "valid") {
      scanResultText.textContent = message;
      scanResultIcon.textContent = type === "invalid" ? "×" : "✓";
      scanResult.className = `scan-result ${type} show`;

      if (navigator.vibrate) {
        navigator.vibrate(type === "valid" ? 120 : [120, 80, 120]);
      }
    }

    function hideScanResult() {
      scanResult.classList.remove("show");
    }

    function setStatus(message, type = "normal") {
      statusBox.textContent = message;
      statusBox.className = "status";
      if (type === "success") statusBox.classList.add("success");
      if (type === "error") statusBox.classList.add("error");
    }

    function setScannerStatus(message, type = "normal") {
      scannerStatus.textContent = message;
      scannerStatus.className = "scanner-status";
      if (type === "success") scannerStatus.classList.add("success");
      if (type === "error") scannerStatus.classList.add("error");
    }

    function showDecodedText(text) {
      const value = text || "Κενό QR / δεν διαβάστηκε κείμενο.";
      if (decodedTextBox) decodedTextBox.textContent = value;
      if (modalDecodedTextBox) modalDecodedTextBox.textContent = value;
    }

    onSnapshot(counterRef, (snapshot) => {
      if (!snapshot.exists()) {
        greenCount.textContent = 0;
        redCount.textContent = 0;
        totalCount.textContent = 0;
        modalGreenCount.textContent = 0;
        modalRedCount.textContent = 0;
        modalTotalCount.textContent = 0;
        setStatus("Δεν υπάρχει ακόμα counter στη βάση. Θα δημιουργηθεί στο πρώτο scan.");
        return;
      }

      const data = snapshot.data();
      const green = data.green || 0;
      const red = data.red || 0;
      const total = data.total || 0;

      greenCount.textContent = green;
      redCount.textContent = red;
      totalCount.textContent = total;
      modalGreenCount.textContent = green;
      modalRedCount.textContent = red;
      modalTotalCount.textContent = total;
    });

    async function addScan(type) {
      await runTransaction(db, async (transaction) => {
        const snap = await transaction.get(counterRef);
        const data = snap.exists() ? snap.data() : { green: 0, red: 0, total: 0 };

        const green = data.green || 0;
        const red = data.red || 0;
        const total = data.total || 0;

        if (type === "friends") {
          transaction.set(counterRef, {
            green: green + 1,
            red,
            total: total + 1
          });
        }

        if (type === "friends_of_friends") {
          transaction.set(counterRef, {
            green,
            red: red + 1,
            total: total + 1
          });
        }
      });
    }

    async function stopScanner() {
      if (!html5QrCode || !scannerRunning) return;

      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
      } catch (error) {
        console.error(error);
      }

      scannerRunning = false;
      html5QrCode = null;
      scanLocked = false;
    }

    window.closeScannerWindow = async function () {
      await stopScanner();
      scannerOverlay.classList.remove("open");
      setStatus("Scanner κλειστός. Πάτα Open Scanner για νέο scan.");
    };

    window.openScannerWindow = async function () {
      scannerOverlay.classList.add("open");
      showDecodedText("Δεν έχει σκαναριστεί ακόμα QR.");
      setScannerStatus("Άνοιγμα κάμερας...");

      if (scannerRunning) {
        setScannerStatus("Ο scanner τρέχει ήδη.", "success");
        return;
      }

      html5QrCode = new Html5Qrcode("reader");

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 210, height: 210 },
            aspectRatio: 1.0
          },
          handleQrScan
        );

        scannerRunning = true;
        hideScanResult();
        setScannerStatus("Scanner ενεργός. Σκάναρε QR.", "success");
        setStatus("Scanner ενεργός μέσα στο παράθυρο.", "success");
      } catch (error) {
        console.error(error);
        showScanResult("Camera error. Δώσε άδεια στην κάμερα.", "invalid");
        setScannerStatus("Δεν άνοιξε η κάμερα. Δώσε camera permission ή δοκίμασε Chrome/Safari.", "error");
        setStatus("Δεν άνοιξε η κάμερα.", "error");
      }
    };

    window.resetCounts = async function () {
      const confirmReset = confirm("Σίγουρα θέλεις reset όλα τα counts;");
      if (!confirmReset) return;

      await setDoc(counterRef, {
        green: 0,
        red: 0,
        total: 0
      });

      showScanResult("Counts reset", "valid");
      setStatus("Τα counts μηδενίστηκαν.", "success");
      setScannerStatus("Τα counts μηδενίστηκαν.", "success");
    };

    async function handleQrScan(decodedText) {
      const cleanText = normalizeQrText(decodedText);
      showDecodedText(cleanText);

      if (scanLocked) return;
      scanLocked = true;

      if (cleanText === FRIENDS_QR) {
        setScannerStatus("Έγκυρο FRIENDS QR. Γίνεται αποθήκευση...", "success");

        try {
          await addScan("friends");
          showScanResult("✓ FRIENDS +1", "valid");
          setScannerStatus("Έγκυρο FRIENDS QR. Προστέθηκε 1 άτομο. Το παράθυρο κλείνει.", "success");
          setStatus("Έγκυρο FRIENDS QR. Προστέθηκε 1 άτομο.", "success");

          setTimeout(async () => {
            await stopScanner();
            window.location.reload();
          }, 850);
        } catch (error) {
          console.error(error);
          scanLocked = false;
          showScanResult("VALID QR αλλά δεν γράφτηκε στη βάση", "invalid");
          setScannerStatus(`Το QR είναι σωστό, αλλά το Firebase δεν το αποθήκευσε: ${error.message}`, "error");
        }

        return;
      }

      if (cleanText === FRIENDS_OF_FRIENDS_QR) {
        setScannerStatus("Έγκυρο FRIENDS OF FRIENDS QR. Γίνεται αποθήκευση...", "success");

        try {
          await addScan("friends_of_friends");
          showScanResult("✓ FRIENDS OF FRIENDS +1", "valid");
          setScannerStatus("Έγκυρο FRIENDS OF FRIENDS QR. Προστέθηκε 1 άτομο. Το παράθυρο κλείνει.", "success");
          setStatus("Έγκυρο FRIENDS OF FRIENDS QR. Προστέθηκε 1 άτομο.", "success");

          setTimeout(async () => {
            await stopScanner();
            window.location.reload();
          }, 850);
        } catch (error) {
          console.error(error);
          scanLocked = false;
          showScanResult("VALID QR αλλά δεν γράφτηκε στη βάση", "invalid");
          setScannerStatus(`Το QR είναι σωστό, αλλά το Firebase δεν το αποθήκευσε: ${error.message}`, "error");
        }

        return;
      }

      showScanResult("Invalid QR. Δεν μετρήθηκε. Δοκίμασε άλλο QR.", "invalid");
      setScannerStatus("Άκυρο QR. Δεν μετρήθηκε. Δοκίμασε άλλο QR.", "error");

      setTimeout(() => {
        scanLocked = false;
      }, 1100);
    }

  </script>
</body>
</html>
